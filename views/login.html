<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Authentication | Patliputra Vidyapeeth</title>
    <!-- Premium Fonts & Security Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-card: rgba(19, 28, 46, 0.75); /* ट्रांसपेरेंट डार्क ग्लासमोर्फिज्म */
            --bg-input: #090d16;
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-lime: #aeea00;
            --text-muted: #94a3b8;
            --text-main: #f8fafc;
            --bg-main: #0b0f19;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            /* 🎯 आपकी भेजी हुई WhatsApp Image 2026-06-29 at 10.37.35 PM (1).jpeg को बैकग्राउंड बनाया */
            background: linear-gradient(rgba(11, 15, 25, 0.65), rgba(11, 15, 25, 0.75)), url('/images/Cam.jpeg') no-repeat center center/cover;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            color: var(--text-main); 
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
            position: relative;
        }

        /* 🔒 MODERN SECURE GATEWAY BOX */
        .login-box { 
            background: var(--bg-card); 
            padding: 45px 40px; 
            border-radius: 16px; 
            box-shadow: 0px 25px 60px rgba(0, 0, 0, 0.65); 
            border: 1px solid var(--border-color); 
            width: 100%; 
            max-width: 420px; 
            text-align: center; 
            box-sizing: border-box;
            position: relative;
            backdrop-filter: blur(14px); /* 🌟 बैकग्राउंड इमेज को बॉक्स के पीछे से ब्लर करने का प्रीमियम इफेक्ट */
            -webkit-backdrop-filter: blur(14px);
            animation: boxSlideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) ease;
        }

        @keyframes boxSlideIn {
            0% { transform: translateY(20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .login-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--accent-lime);
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
        }

        .auth-icon-shield {
            width: 60px;
            height: 60px;
            background: rgba(174, 234, 0, 0.08);
            border: 1px solid rgba(174, 234, 0, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px auto;
            color: var(--accent-lime);
            font-size: 1.6rem;
        }

        h2 { 
            color: var(--text-main); 
            margin: 0 0 6px 0; 
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        
        p { 
            color: var(--text-muted); 
            font-size: 0.85rem; 
            margin: 0 0 35px 0; 
        }

        .input-group {
            text-align: left;
            margin-bottom: 22px;
        }

        label { 
            display: block; 
            color: var(--text-muted); 
            font-weight: 500; 
            font-size: 0.8rem; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            color: var(--text-muted);
            font-size: 0.95rem;
            transition: color 0.2s ease;
        }

        input { 
            width: 100%; 
            padding: 14px 16px 14px 45px; 
            box-sizing: border-box; 
            background: var(--bg-input); 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            color: white; 
            font-family: inherit; 
            font-size: 0.9rem; 
            transition: all 0.2s ease;
        }

        input:focus { 
            border-color: var(--accent-lime); 
            box-shadow: 0 0 0 3px rgba(174, 234, 0, 0.15);
            outline: none; 
        }

        input:focus + i {
            color: var(--accent-lime);
        }

        button { 
            width: 100%; 
            background: var(--accent-lime); 
            color: var(--bg-main); 
            font-weight: 600; 
            padding: 14px; 
            border: none; 
            border-radius: 8px; 
            margin-top: 15px; 
            cursor: pointer; 
            font-size: 0.95rem; 
            font-family: inherit; 
            transition: all 0.2s ease; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:hover { 
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(174, 234, 0, 0.3);
        }

        .back-link { 
            display: inline-flex; 
            align-items: center;
            gap: 8px;
            margin-top: 25px; 
            color: var(--text-muted); 
            text-decoration: none; 
            font-size: 0.85rem; 
            transition: color 0.2s ease;
        }

        .back-link:hover { 
            color: var(--text-main); 
        }
    </style>
</head>
<body>

<!-- 🔒 CONTROL INTERFACE BOX -->
<div class="login-box">
    <div class="auth-icon-shield">
        <i class="fas fa-lock"></i>
    </div>
    
    <h2>Console Gateway</h2>
    <p>Patliputra Vidyapeeth Admin Authentication</p>
    
    <form action="/api/admin/login" method="POST">
        <div class="input-group">
            <label>Admin ID / Username</label>
            <div class="input-wrapper">
                <input type="text" name="username" placeholder="Enter admin username" required autocomplete="off">
                <i class="fas fa-user-shield"></i>
            </div>
        </div>

        <div class="input-group">
            <label>Secret Password</label>
            <div class="input-wrapper">
                <input type="password" name="password" placeholder="Enter secret password" required>
                <i class="fas fa-key"></i>
            </div>
        </div>

        <button type="submit">
            <span>Verify & Authenticate</span> <i class="fas fa-arrow-right"></i>
        </button>
    </form>
    
    <a href="/" class="back-link">
        <i class="fas fa-arrow-left-long"></i> Return to Website
    </a>
</div>

</body>
</html>
