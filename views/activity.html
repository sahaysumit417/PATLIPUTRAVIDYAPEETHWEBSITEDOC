<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity View | Patliputra Vidyapeeth</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/css/c.css">
</head>
<body>

    <!-- Dynamic Main Header Sync -->
    <nav id="dynamic-header"></nav>

    <main class="main-content-limiter" style="margin-top: 120px;">
        <div class="back-home-wrapper" style="text-align: left; margin-bottom: 25px;">
            <a href="/" class="btn-secondary" style="background: var(--primary-brand); padding: 8px 16px; font-size: 0.9rem; text-decoration: none; border-radius: 6px;"><i class="fas fa-arrow-left"></i> Back to Home</a>
        </div>

        <div class="full-width-card-panel" style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center; flex-wrap: wrap;">
            <div>
                <h1 id="activity-title" class="page-title-main" style="margin-top: 0; text-align: left; font-size: 2.2rem; color: var(--primary-brand);">Loading Title...</h1>
                <div class="title-separator" style="margin: 0 0 20px 0;"></div>
                <p id="activity-desc" class="paragraph-lead" style="color: var(--text-muted);">Synchronizing sector nodes with server data...</p>
            </div>
            <div>
                <img id="activity-img" src="" alt="Activity Frame" style="width: 100%; height: 350px; object-fit: cover; border-radius: 12px; box-shadow: var(--green-shadow); border: 2px solid rgba(15,46,30,0.08);">
            </div>
        </div>
    </main>

    

    <!-- Script to Fetch content dynamically -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // URL से एक्टिविटी का प्रकार (sports, music आदि) निकालना
            const pathParts = window.location.pathname.split('/');
            const activityType = pathParts[pathParts.length - 1];

            // API से उस एक्टिविटी का डेटा उठाना
            fetch(`/api/beyond-academics/${activityType}`)
                .then(res => res.json())
                .then(data => {
                    if (data.error) {
                        document.getElementById('activity-title').innerText = "Not Found";
                        document.getElementById('activity-desc').innerText = "The requested activity does not exist.";
                    } else {
                        document.getElementById('activity-title').innerText = data.title;
                        document.getElementById('activity-desc').innerText = data.description;
                        document.getElementById('activity-img').src = data.image;
                        document.title = `${data.title} | Patliputra Vidyapeeth`;
                    }
                })
                .catch(err => console.error("Error loading activity telemetry:", err));
        });
    </script>
    <script src="/js/main.js"></script>
    <footer id="dynamic-footer"></footer>
</body>
</html>
